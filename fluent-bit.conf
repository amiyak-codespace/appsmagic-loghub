[SERVICE]
    Flush            1
    Daemon           Off
    Log_Level        info
    Parsers_File     /fluent-bit/etc/parsers.conf

[INPUT]
    Name             tail
    Path             /logs/magic-event/eventmagic-api.log
    Parser           json
    Tag              magic-event.api
    DB               /fluent-bit/state/magic-event-api.db
    Mem_Buf_Limit    32MB
    Skip_Long_Lines  On
    Refresh_Interval 3

[INPUT]
    Name             forward
    Listen           0.0.0.0
    Port             24224
    Tag              microservice.forward

[FILTER]
    Name             record_modifier
    Match            magic-event.api
    Record           source magic-event-api

[OUTPUT]
    Name             file
    Match            magic-event.api
    Path             /centralized
    File             appsmagic-central.log
    Format           out_file

[OUTPUT]
    Name             file
    Match            microservice.forward
    Path             /centralized
    File             appsmagic-central.log
    Format           out_file
